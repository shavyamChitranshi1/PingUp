<!DOCTYPE html>
<html>
<head>
  <title>Chat UI</title>
  <script src="https://cdn.socket.io/4.7.1/socket.io.min.js"></script>

  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f2f5;
    }

    .container {
      display: flex;
      width: 80%;
      height: 80vh;
    }

    #users {
      width: 25%;
      border-right: 1px solid #ccc;
      overflow-y: auto;
      background: white;
      padding: 10px;
    }

    #users li {
      cursor: pointer;
      padding: 8px;
      border-bottom: 1px solid #eee;
    }

    #users li:hover {
      background: #f5f5f5;
    }

    .chat-box {
      width: 75%;
      display: flex;
      flex-direction: column;
      background: white;
    }

    #history {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      list-style: none;
    }

    #history li {
      margin-bottom: 10px;
      padding: 8px;
      background: #e4e6eb;
      border-radius: 8px;
      max-width: 60%;
    }

    .input-box {
      display: flex;
      border-top: 1px solid #ccc;
      padding: 10px;
    }

    #messageInput {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    #sendBtn {
      margin-left: 10px;
      padding: 10px 20px;
      border: none;
      background: #0084ff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    #sendBtn:hover {
      background: #006edc;
    }
  </style>
</head>

<body>

<div class="container">

  <ul id="users"></ul>

  <div class="chat-box">
    <h3 id="username"></h3>
    <button onclick="logout()">Logout</button>

    <ul id="history"></ul>

    <div class="input-box">
      <input type="text" id="messageInput" placeholder="Type a message" />
      <button id="sendBtn">Send</button>
    </div>
  </div>
  
</div>

<script>
  const token = localStorage.getItem("token");
  if(!token)
  {
    window.location.href= "login.html";
  }

 function logout()
  {
    localStorage.removeItem("token");
    alert("Logged out");
    window.location.href="login.html";
  }

  const socket = io("http://localhost:5000",  {auth:{
    token:token
  }}); 

  let selecteduser = null;
  
  function selectUser(user) {
    selecteduser = user;
    document.getElementById("history").innerHTML = ""; 
    socket.emit("load_messages", selecteduser);
  }

  let username = null;

  socket.on("User_List", (users) => {
    if (!username) return;

    const list = document.getElementById("users");
    list.innerHTML = "";

    for (let user in users) {
      if(user === username) continue;
      const li = document.createElement("li");
      li.textContent = user;
      li.onclick = () => selectUser(user);
      list.appendChild(li);
    }
  });

  socket.once("me", (name) => {
    username = name;
    document.getElementById("username").innerText = "You:" + username;
  });

  document.getElementById("sendBtn").onclick = () => {
    const msg = document.getElementById("messageInput").value;

    if (!selecteduser) {
      alert("Select a user first");
      return;
    }

    if (!msg.trim()) return;

    socket.emit("private_message", {
      to: selecteduser,
      message: msg,
    });

    document.getElementById("messageInput").value = "";
  };

  socket.on("receive_message", (data) => {
    const ul = document.getElementById("history");

    const li = document.createElement("li");
    const date = new Date();

    li.textContent = data.from + ": " + data.message + " "+ date.toLocaleTimeString();

    ul.appendChild(li);

    ul.scrollTop = ul.scrollHeight;
  });

  socket.on("chat_history", (messages) => {
    const ul = document.getElementById("history");

    ul.innerHTML = ""; 

    for (let msg of messages) {
      const li = document.createElement("li");

      const date = new Date(msg.time);

      li.textContent =
        msg.from + ": " +
        msg.message + " (" +
        date.toLocaleTimeString() + ")";

      ul.appendChild(li);
    }

    ul.scrollTop = ul.scrollHeight; 
  });

</script>

</body>
</html>
